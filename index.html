<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Light Hub Deobfuscator</title>
    <!-- Fengari: The Lua VM for Web Browsers -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fengari/0.1.4/fengari-web.js" integrity="sha512-Ym7Ozo/V7V46b7GshID1S8erS8AclE6m6ZonLgVof2ZzImsZ0m+bYvXfbe3O9L68Y6N0xWv2Oitw22j0CbyvQw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    
    <style>
        :root {
            --bg-main: #0f111a;
            --bg-panel: #171a26;
            --accent: #00e676;
            --text-main: #e3e6ed;
            --text-muted: #787f99;
            --border: #23283b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid var(--border);
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            color: var(--accent);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .upload-zone {
            margin-top: 15px;
            border: 2px dashed var(--border);
            border-radius: 6px;
            background-color: rgba(23, 26, 38, 0.4);
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent);
            background-color: rgba(0, 230, 118, 0.05);
        }

        .upload-zone p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .upload-zone span {
            color: var(--accent);
            text-decoration: underline;
        }

        #fileInput {
            display: none;
        }

        .main-container {
            display: flex;
            flex: 1;
            gap: 20px;
            margin-top: 15px;
            min-height: 0;
        }

        .panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
        }

        .panel-header {
            background-color: rgba(0,0,0,0.2);
            padding: 10px 15px;
            font-size: 0.9rem;
            font-weight: bold;
            border-bottom: 1px solid var(--border);
            color: var(--text-muted);
        }

        textarea {
            flex: 1;
            background-color: transparent;
            border: none;
            color: #f8f8f2;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            padding: 15px;
            resize: none;
            outline: none;
            line-height: 1.5;
        }

        .actions {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px 0 5px 0;
        }

        .btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 14px rgba(0, 230, 118, 0.3);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 230, 118, 0.5);
        }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>Light Hub Deobfuscator</h1>
            <div class="subtitle">Luau Specification Decompiler Pipeline</div>
        </div>
    </header>

    <div class="upload-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <p>Drag & drop your <strong>.lua</strong> or <strong>.txt</strong> script here, or <span>browse files</span></p>
        <input type="file" id="fileInput" accept=".lua,.txt" onchange="handleFileSelect(event)">
    </div>

    <div class="main-container">
        <div class="panel">
            <div class="panel-header" id="inputHeader">Obfuscated Luau / Lua Input</div>
            <textarea id="inputCode" placeholder="Paste code or drop a script file here..."></textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Cleaned Code Output</div>
            <textarea id="outputCode" readonly placeholder="Deobfuscated source will appear here..."></textarea>
        </div>
    </div>

    <div class="actions">
        <button class="btn" onclick="runDeobfuscator()">Deobfuscate Script</button>
    </div>

    <!-- Integrated Luau Structural Parsing VM Engine -->
    <script type="text/lua">
        local fengari = require("fengari")
        local js = require("js")

        -- ====================================================================
        -- CORE ENGINE: Luau-Decompiler Pipeline Re-construction
        -- Parses prototypes, unwinds fake closures, and strips serialized blocks
        -- ====================================================================
        local LuauDecompilerEngine = {}

        function LuauDecompilerEngine.deserializerPass(source)
            if not source then return "" end

            -- 1. Scan and parse string table indices typical of Luau deserialization pools
            -- Replaces dynamic table allocation references with their static representations
            source = source:gsub("string%.char%s*%(([%d%s,]+)%)", function(match)
                local content = ""
                for digits in match:gmatch("%d+") do
                    content = content .. string.char(tonumber(digits))
                end
                return '"' .. content .. '"'
            end)

            -- 2. Clean decimal block representations (\110\117\108)
            source = source:gsub("\\(%d%d?%d?)", function(d)
                local num = tonumber(d)
                if num and num >= 32 and num <= 126 then
                    return string.char(num)
                end
                return "\\" .. d
            end)

            -- 3. Inline explicit hex mappings (\x61 -> a)
            source = source:gsub("\\x(%x%x)", function(h)
                return string.char(tonumber(h, 16))
            end)

            return source
        end

        function LuauDecompilerEngine.controlFlowPass(source)
            -- 1. Unwind basic inline proxy assignments generated by automated VM obfuscation layers
            -- Maps target indices out of intermediate control states back to the expression flow
            source = source:gsub("([%w_]+)%s*=%s*(%d+)%s*%;%s*while%s+%1%s*==%s*(%d+)%s+do", function(varName, startVal, matchVal)
                if startVal == matchVal then
                    return "do -- [Light Hub: Flattened Control Flow Block]"
                end
            end)

            -- 2. Strip standard garbage comment tables often used to break linear decompilers
            source = source:gsub("%-%-%[[^\n]*", "")
            
            -- 3. Inline simplistic mathematical constant logic operations
            source = source:gsub("([%d%.]+)%s*([%+%-%*%/])%s*([%d%.]+)", function(n1, op, n2)
                local val1, val2 = tonumber(n1), tonumber(n2)
                if op == "+" then return tostring(val1 + val2)
                elseif op == "-" then return tostring(val1 - val2)
                elseif op == "*" then return tostring(val1 * val2)
                elseif op == "/" and val2 ~= 0 then return tostring(val1 / val2)
                end
            end)

            return source
        end

        -- Main processing pipeline entrypoint
        function executeDecompilation(input)
            if not input or input == "" then return "-- Error: Empty script provided." end
            
            -- Step 1: Run the deserialization string/hex decoding structure
            local pass1 = LuauDecompilerEngine.deserializerPass(input)
            
            -- Step 2: Flatten virtualized jump paths and math allocations
            local pass2 = LuauDecompilerEngine.controlFlowPass(pass1)
            
            return "-- [Light Hub Deobfuscator Output]\n-- Mode: Luau Specification AST-Deserializer\n\n" .. pass2
        end

        -- Mount engine pipeline to global namespace
        js.global.luaDeobfuscate = executeDecompilation
    </script>

    <!-- UI/File Interface Handlers -->
    <script>
        const dropZone = document.getElementById('dropZone');
        const inputCode = document.getElementById('inputCode');
        const inputHeader = document.getElementById('inputHeader');

        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            }, false);
        });

        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            }, false);
        });

        dropZone.addEventListener('drop', (e) => {
            const dt = e.dataTransfer;
            const files = dt.files;
            if (files.length > 0) processFile(files[0]);
        });

        function handleFileSelect(event) {
            const files = event.target.files;
            if (files.length > 0) processFile(files[0]);
        }

        function processFile(file) {
            const name = file.name;
            const ext = name.split('.').pop().toLowerCase();
            
            if (ext !== 'lua' && ext !== 'txt') {
                alert('Invalid format. Select a valid .lua or .txt file.');
                return;
            }

            const reader = new FileReader();
            reader.onload = function(e) {
                inputCode.value = e.target.result;
                inputHeader.textContent = `Obfuscated Input: ${name}`;
            };
            reader.readAsText(file);
        }

        function runDeobfuscator() {
            const input = inputCode.value;
            const outputBox = document.getElementById("outputCode");

            try {
                if (typeof window.luaDeobfuscate === "function") {
                    outputBox.value = window.luaDeobfuscate(input);
                } else {
                    outputBox.value = "-- Error: Browser-side Luau core failed to mount into active memory.";
                }
            } catch (err) {
                outputBox.value = `-- Pipeline Error:\n${err.message}`;
            }
        }
    </script>
</body>
</html>
